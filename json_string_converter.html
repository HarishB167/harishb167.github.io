<!DOCTYPE html>
<html>
<body>

<script>
  var result = ""
  function helper(value) {
  	if (value.length >= 1 && value.includes(":")) {
  		var key = value.split(":")[0]
        var val = value.split(":")[1]
        result += '"' + key + '" : ' + val + ',\n'
        //alert(result)
    }
    //alert(value.length + " " + value.includes(":"))
  }
  
  function convert_code() {
  	var text = document.getElementById("input_data").value;
    
    var ls = text.split("\n")
    result = "{"
    
    ls.forEach(helper);
    
    result += "}"
  	
    document.getElementById("result").innerHTML = result;
  }
</script>

<h1>Data dictionary to python code</h1>
<hr />
<p>Enter your text here :</p>
<p><textarea id="input_data" cols="50" name="input_data" rows="4"></textarea> 
<br /><br />
</p>
<input type="submit" value="Submit" onclick="convert_code()"/></p>

<textarea id="result" cols="50" rows="40"></textarea>

</body>
</html>
